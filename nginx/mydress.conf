server {
    listen 80;

    # הכתובת הציבורית של השרת שלך
    server_name 18.197.154.189;

    # הנתיב המדויק שבו יושבים הקבצים שלך
    root /opt/app/waismans_dresses/frontend;
    index index.html;

    # 1. הגשת קבצי ה-Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. העברת בקשות ה-API אל FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. בדיקת תקינות ה-Backend
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}